# Schema: SimplifiedIsolatedTarget

target_id: psc_activation_rate_PDAC_deriv001

# =============================================================================
# INPUTS: Extracted values with full provenance
# =============================================================================
inputs:
  # Experimental conditions from the paper
  - name: culture_time_day1
    value: 24.0
    units: hour
    input_type: experimental_condition
    role: auxiliary
    source_ref: Apte1998_PeriacinarPSC
    source_location: Results and abstract, description of 24 h and 48 h cultured PSCs
    value_snippet: |
      "Cells cultured for 24 hours had an angular appearance, contained lipid droplets manifesting positive vitamin A autofluorescence, and stained positively for desmin but negatively for alpha-SMA."

  - name: culture_time_day2
    value: 48.0
    units: hour
    input_type: experimental_condition
    role: auxiliary
    source_ref: Apte1998_PeriacinarPSC
    source_location: Results and abstract, description of 24 h and 48 h cultured PSCs
    value_snippet: |
      "At 48 hours, cells were positive for alpha-SMA."

  # Modeled activation fractions (assumptions derived from qualitative data)
  - name: activation_fraction_day1_mean
    value: 0.05
    units: dimensionless
    input_type: inferred_estimate
    role: initial_condition  # Used as IC for ODE starting at day 1
    source_ref: Apte1998_PeriacinarPSC
    source_location: Results (24 h cultures described as α-SMA negative)
    value_snippet: |
      "Cells cultured for 24 hours... stained positively for desmin but negatively for alpha-SMA."

  - name: activation_fraction_day1_sd
    value: 0.025
    units: dimensionless
    input_type: inferred_estimate
    role: auxiliary
    source_ref: Apte1998_PeriacinarPSC
    source_location: Results (24 h cultures described as α-SMA negative)

  - name: activation_fraction_day2_mean
    value: 0.95
    units: dimensionless
    input_type: inferred_estimate
    role: target  # Calibration target at day 2
    source_ref: Apte1998_PeriacinarPSC
    source_location: Results (48 h cultures α-SMA positive)
    value_snippet: |
      "At 48 hours, cells were positive for alpha-SMA."

  - name: activation_fraction_day2_sd
    value: 0.05
    units: dimensionless
    input_type: inferred_estimate
    role: auxiliary
    source_ref: Apte1998_PeriacinarPSC
    source_location: Results (48 h cultures α-SMA positive)

# =============================================================================
# CALIBRATION: Everything needed for inference
# =============================================================================
calibration:
  parameters:
    - name: k_psc_activation
      units: 1/day
      prior:
        distribution: lognormal
        mu: 1.099  # log(3.0) - expect ~3/day for 5%→95% in 1 day
        sigma: 0.5
        rationale: |
          Prior centered at 3/day. Derivation: for first-order activation
          0.95 = 1 - 0.95*exp(-k*1) implies k ≈ 2.94/day. Narrower sigma
          since transition is well-constrained between day 1 and day 2.

  state_variables:
    - name: qPSC_norm
      units: dimensionless
      initial_condition:
        value: 1.0
        rationale: |
          At t=0, all freshly isolated PSCs are quiescent (α-SMA negative). Normalized to 1.0 to represent total population fraction.

    - name: aPSC_norm
      units: dimensionless
      initial_condition:
        value: 0.0
        rationale: |
          At t=0, no PSCs are activated yet. α-SMA was negative at 24h suggesting near-zero activated fraction at baseline.

  model:
    type: two_state
    forward_rate: k_psc_activation
    data_rationale: |
      Freshly isolated quiescent PSCs cultured on rigid plastic transition from α-SMA negative (24h) to α-SMA positive (48h). This is a unidirectional state transition (quiescent → activated) measurable at two timepoints, fitting a two-state first-order model.
    submodel_rationale: |
      The full QSPIO_PDAC model represents PSC activation (qPSC → aPSC) via Reaction_235 with saturable TGF-β and PDGF dependence. In vitro culture on plastic with serum drives autocrine TGF-β/PDGF to near-saturating levels, so the reaction reduces to first-order: d(qPSC)/dt = -k_psc_activation * qPSC.

  independent_variable:
    name: time
    units: day
    span: [0.0, 2.0]
    rationale: |
      Observations at 24h (day 1) and 48h (day 2) culture timepoints define the span.

  measurements:
    - name: activation_fraction
      observable:
        type: custom
        state_variables: [qPSC_norm, aPSC_norm]
        code: |
          def compute(t, y):
              """Return activated fraction: aPSC / (qPSC + aPSC)."""
              total = y['qPSC_norm'] + y['aPSC_norm']
              if total <= 0:
                  return 0.0
              return y['aPSC_norm'] / total
        rationale: |
          The experimental readout is α-SMA immunostaining marking activated PSCs. Represented as aPSC/(qPSC+aPSC).
      units: dimensionless
      uses_inputs:
        - activation_fraction_day1_mean
        - activation_fraction_day1_sd
        - activation_fraction_day2_mean
        - activation_fraction_day2_sd
      evaluation_points: [1.0, 2.0]
      sample_size: 3
      sample_size_rationale: |
        Sample size not explicitly reported; assumed n=3 independent PSC preparations per timepoint, typical for primary cell culture studies.
      distribution_code: |
        def derive_distribution(inputs, ureg):
            import numpy as np

            means = [
                inputs['activation_fraction_day1_mean'].magnitude,
                inputs['activation_fraction_day2_mean'].magnitude
            ]
            sds = [
                inputs['activation_fraction_day1_sd'].magnitude,
                inputs['activation_fraction_day2_sd'].magnitude
            ]
            n = 10000

            medians = []
            ci95_list = []

            np.random.seed(0)
            for m, sd in zip(means, sds):
                samples = np.random.normal(loc=m, scale=sd, size=n)
                samples = np.clip(samples, 0.0, 1.0)
                medians.append(np.median(samples))
                lo, hi = np.percentile(samples, [2.5, 97.5])
                ci95_list.append([lo, hi])

            return {
                'median': medians,
                'ci95': ci95_list,
                'units': 'dimensionless'
            }
      likelihood:
        distribution: normal
        rationale: |
          Activation fractions assumed normally distributed around observed means with estimated SDs.

  identifiability_notes: |
    With two approximate activation fractions at 1 and 2 days and a simple two-compartment first-order transition, k_psc_activation is roughly identifiable as the characteristic activation rate. However, the qualitative nature of the staining data and use of assumed activation fractions introduce substantial uncertainty; the parameter should be interpreted as an order-of-magnitude estimate.

# =============================================================================
# EXPERIMENTAL CONTEXT
# =============================================================================
experimental_context:
  species: rat
  system: in_vitro_primary_cells
  indication: PDAC
  cell_types:
    - name: pancreatic stellate cell
      phenotype: quiescent → activated
      isolation_method: Density gradient separation from normal rat pancreas
  culture_conditions:
    substrate: plastic (rigid)
    culture_type: 2d_monolayer
    oxygen_level: normoxic

# =============================================================================
# STUDY INTERPRETATION
# =============================================================================
study_interpretation: |
  Apte et al. (1998) isolated quiescent periacinar pancreatic stellate cells (PSCs) from normal rat pancreas and cultured them on plastic. At 24 h in culture, cells retained lipid droplets, were α-SMA negative, and are interpreted as quiescent PSCs. By 48 h, the same cultures showed α-SMA-positive staining with myofibroblast-like morphology, consistent with activated PSCs. This qualitative shift between 24 h and 48 h indicates that PSC activation from a quiescent to α-SMA-positive myofibroblast-like state occurs over an O(1–2 day) timescale under strong activating conditions.

key_assumptions:
  - |
    Qualitative α-SMA immunostaining (negative at 24 h, positive at 48 h) is mapped to normalized activation fractions of approximately 0.05 and 0.95, respectively.
  - |
    All isolated PSCs are quiescent at the start of culture (t=0), so the total PSC population can be normalized to 1.0.
  - |
    Autocrine production of TGF-β and PDGF, together with serum and rigid plastic, drives ligands into a regime where saturation terms are effectively 1.
  - |
    Rat PSC activation kinetics in vitro provide an upper bound for human PSC/CAF activation rates in PDAC tumors.

key_study_limitations:
  - |
    The primary data are qualitative (α-SMA negative vs positive) rather than quantitative fractions.
  - |
    Culture on rigid plastic with serum likely produces faster PSC activation than occurs in vivo.
  - |
    The experiment uses normal rat PSCs rather than human PDAC-associated stellate cells.
  - |
    No explicit time-course beyond 24 h and 48 h is reported.

