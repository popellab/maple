# Translated from: qspio-pdac/metadata-storage/isolated_system_targets/psc_recruitment_const_PDAC_deriv001.yaml
# Schema: SimplifiedIsolatedTarget

target_id: psc_recruitment_const_PDAC_deriv001

# =============================================================================
# INPUTS: Extracted values with full provenance
# =============================================================================
inputs:
  - name: psc_fraction_mean
    value: 0.0399
    units: dimensionless
    input_type: direct_measurement
    role: target
    source_ref: Apte1998_PSCIsolation
    source_location: Results, text
    value_snippet: |
      Pancreatic stellate shaped cells had a periacinar distribution. They comprised 3.99% of all pancreatic cells; hepatic stellate cells comprised 7.94% of all hepatic cells.

  - name: psc_fraction_cv
    value: 0.25
    units: dimensionless
    input_type: assumed_value
    role: auxiliary
    source_ref: Apte1998_PSCIsolation
    source_location: Not reported; assumed from typical biological variability

  - name: total_cell_density_mean
    value: 1.0e9
    units: cell/milliliter
    input_type: assumed_value
    role: fixed_parameter
    source_ref: Scharfmann2019_BetaCellLines
    source_location: Derived from beta-cell mass (~1e9 cells in ~1g tissue)

  - name: total_cell_density_cv
    value: 0.3
    units: dimensionless
    input_type: assumed_value
    role: auxiliary
    source_ref: Scharfmann2019_BetaCellLines
    source_location: Assumed; accounts for age, fat infiltration, sampling location

# =============================================================================
# CALIBRATION: Everything needed for inference
# =============================================================================
calibration:
  parameters:
    - name: k_psc_const
      units: cell/milliliter
      prior:
        distribution: lognormal
        mu: 17.425  # log(3.7e7)
        sigma: 1.0
        rationale: |
          Prior centered at 3.7e7 cell/mL from PSC fraction (3.99%) times
          assumed total cell density (~1e9 cell/mL). Wide prior to account
          for uncertainty in both the fraction and total density.

  # No state_variables - direct conversion

  model:
    type: direct_conversion
    formula: "k_psc_const = psc_fraction × total_cell_density"
    data_rationale: |
      PSC fraction (3.99%) from histology combined with assumed total cell density gives absolute PSC density. No ODE dynamics needed - this is a static baseline measurement.
    submodel_rationale: |
      k_psc_const represents the constitutive quiescent PSC density in normal pancreatic tissue. This baseline density serves as a carrying-capacity-like parameter in the full model before tumor-driven stromal remodeling.

  # No independent_variable - direct conversion

  measurements:
    - name: psc_density
      units: cell/milliliter
      uses_inputs:
        - psc_fraction_mean
        - psc_fraction_cv
        - total_cell_density_mean
        - total_cell_density_cv
      evaluation_points: []  # No time-based evaluation
      sample_size: 6
      sample_size_rationale: |
        Apte et al. (1998) did not state sample size; assumed n=6 rats based on typical histologic quantification studies.
      distribution_code: |
        def derive_distribution(inputs, ureg):
            import numpy as np

            rng = np.random.default_rng(42)
            n = 10000

            # PSC fraction (lognormal)
            m_f = inputs['psc_fraction_mean'].magnitude
            cv_f = inputs['psc_fraction_cv'].magnitude
            sd_f = m_f * cv_f
            mu_log_f = np.log(m_f**2 / np.sqrt(m_f**2 + sd_f**2))
            sigma_log_f = np.sqrt(np.log(1.0 + (sd_f**2) / (m_f**2)))
            frac_samples = rng.lognormal(mu_log_f, sigma_log_f, n)

            # Total cell density (lognormal)
            m_rho = inputs['total_cell_density_mean'].magnitude
            cv_rho = inputs['total_cell_density_cv'].magnitude
            sd_rho = m_rho * cv_rho
            mu_log_rho = np.log(m_rho**2 / np.sqrt(m_rho**2 + sd_rho**2))
            sigma_log_rho = np.sqrt(np.log(1.0 + (sd_rho**2) / (m_rho**2)))
            rho_samples = rng.lognormal(mu_log_rho, sigma_log_rho, n)

            # PSC density = fraction × total density
            psc_density_samples = frac_samples * rho_samples

            return {
                'median': [np.median(psc_density_samples)],
                'ci95': [[np.percentile(psc_density_samples, 2.5),
                          np.percentile(psc_density_samples, 97.5)]],
                'units': 'cell/milliliter'
            }
      likelihood:
        distribution: lognormal
        rationale: |
          Product of two lognormal distributions (fraction and density) is lognormal.

  identifiability_notes: |
    k_psc_const is directly computed from the product of PSC fraction and total cell density. The primary uncertainty comes from the assumed total cell density (~1e9 cells/mL) and the assumed CVs, not from structural non-identifiability.

# =============================================================================
# EXPERIMENTAL CONTEXT
# =============================================================================
experimental_context:
  species: rat
  system: ex_vivo_fresh
  indication: healthy
  cell_types:
    - name: pancreatic stellate cell
      phenotype: quiescent (desmin/GFAP positive)

# =============================================================================
# STUDY INTERPRETATION
# =============================================================================
study_interpretation: |
  Apte et al. (1998) quantified that pancreatic stellate cells comprise 3.99% of all pancreatic cells in normal rat pancreas. To obtain absolute PSC density for the model parameter k_psc_const (cell/mL), we combine this fraction with an assumed total cell density of ~1e9 cells/mL based on human beta-cell mass data. This provides a prior for the constitutive quiescent PSC density before tumor-driven remodeling.

key_assumptions:
  - |
    Rat PSC fraction (3.99%) is representative of human quiescent PSC fraction.
  - |
    Total pancreatic cell density (~1e9 cells/mL) approximated from beta-cell mass data.
  - |
    Uncertainty represented via lognormal variability (25% CV for fraction, 30% CV for density).

key_study_limitations:
  - |
    Primary data from rat, not human pancreas.
  - |
    PSC fraction measured in healthy pancreas; may underestimate density in inflamed/pre-neoplastic tissue.
  - |
    No variance reported for 3.99% fraction; CV assumed.
  - |
    Total cell density inferred indirectly, not measured.

