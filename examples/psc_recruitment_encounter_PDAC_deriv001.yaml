# Translated from: qspio-pdac/metadata-storage/isolated_system_targets/psc_recruitment_encounter_PDAC_deriv001.yaml
# Schema: SubmodelTarget

target_id: psc_recruitment_encounter_PDAC_deriv001

# =============================================================================
# INPUTS: Extracted values with full provenance
# =============================================================================
inputs:
  - name: naive_psc_fraction_week8_mean
    value: 0.3
    units: dimensionless
    input_type: inferred_estimate
    role: target
    source_ref: Tansi2024_Orthotopic
    source_location: Figure 8B (Panc-1-fl, primary tumor, naive PSCs, 8 weeks)
    extraction_method: manual
    value_snippet: |
      "Each bar represents the relative number of stained cells within the slices of 1–3 animals."

  - name: naive_psc_fraction_week8_sd
    value: 0.07
    units: dimensionless
    input_type: inferred_estimate
    role: auxiliary
    source_ref: Tansi2024_Orthotopic
    source_location: Figure 8B (error bars)
    extraction_method: manual
    value_snippet: '"Error bars represent standard deviations (S.D.)"'

  - name: naive_psc_fraction_week10_mean
    value: 0.45
    units: dimensionless
    input_type: inferred_estimate
    role: target
    source_ref: Tansi2024_Orthotopic
    source_location: Figure 8B (Panc-1-fl, primary tumor, naive PSCs, 10 weeks)
    extraction_method: manual

  - name: naive_psc_fraction_week10_sd
    value: 0.1
    units: dimensionless
    input_type: inferred_estimate
    role: auxiliary
    source_ref: Tansi2024_Orthotopic
    source_location: Figure 8B (error bars)
    extraction_method: manual

  - name: initial_psc_fraction_week4
    value: 0.15
    units: dimensionless
    input_type: inferred_estimate
    role: initial_condition
    source_ref: Tansi2024_Orthotopic
    source_location: Figure 8B (Panc-1-fl, primary tumor, naive PSCs, 4 weeks)
    extraction_method: manual
    value_snippet: |
      Semiquantitative bar for naive vitamin A-positive PSCs in Panc-1-fl primary tumors at 4 weeks post-implantation.

# =============================================================================
# CALIBRATION: Everything needed for inference
# =============================================================================
calibration:
  parameters:
    - name: k_psc_encounter
      units: cell/(milliliter*day)
      prior:
        distribution: lognormal
        mu: 13.816  # log(1e6)
        sigma: 2.0
        rationale: |
          Wide prior for recruitment rate. Only the ratio k_psc_encounter/k_psc_const
          is directly constrained by this target. Prior centered at 1e6 cell/mL/day
          with large sigma to allow joint constraint with k_psc_const target.
    - name: k_psc_const
      units: cell/milliliter
      prior:
        distribution: lognormal
        mu: 17.425  # log(3.7e7)
        sigma: 1.0
        rationale: |
          Prior centered at 3.7e7 cell/mL, same as psc_recruitment_const target.
          This parameter appears in both targets for joint constraint.

  state_variables:
    - name: f_qPSC
      units: dimensionless
      initial_condition:
        input_ref: initial_psc_fraction_week4
        rationale: |
          Initial fraction at t=28 days (4 weeks) from Figure 8B; represents PSC recruitment that has already occurred by the first measurement timepoint.

  model:
    type: custom
    code: |
      def ode(t, y, params, inputs):
          """Recruitment of naive PSCs into tumor, approaching constitutive density.

          df_qPSC/dt = (k_psc_encounter / k_psc_const) * (1 - f_qPSC)

          f_qPSC = fraction of local constitutive PSC density filled in tumor.
          """
          f_qpsc = y['f_qPSC']
          k_enc = params['k_psc_encounter']
          k_const = params['k_psc_const']

          k_eff = k_enc / k_const  # effective approach rate (1/day)
          df_dt = k_eff * (1.0 - f_qpsc)

          return {'f_qPSC': df_dt}
    code_julia: |
      function recruitment_ode!(du, u, p, t)
          # p = [k_psc_encounter, k_psc_const]
          k_psc_encounter, k_psc_const = p
          k_eff = k_psc_encounter / k_psc_const
          du[1] = k_eff * (1.0 - u[1])
      end
    data_rationale: |
      Naive PSC fraction increases from ~0.15 (week 4) to ~0.45 (week 10), suggesting gradual recruitment approaching a saturation level. A first-order approach to equilibrium (df/dt = k*(1-f)) captures this saturation dynamics.
    submodel_rationale: |
      From full-model reaction: null → V_T.qPSC at rate k_psc_encounter * V_T * ((k_psc_const - ρ) / k_psc_const). Defining f = ρ/k_psc_const and assuming slow tumor volume change yields df/dt = (k_psc_encounter/k_psc_const) * (1 - f). This preserves the mechanistic recruitment term while working in dimensionless fraction.

  independent_variable:
    name: time
    units: day
    span: [28.0, 70.0]
    rationale: |
      Measurements at 4 weeks (t=28, used as IC), 8 weeks (t=56), and 10 weeks (t=70) post-implantation.

  measurements:
    - name: naive_psc_fraction
      observable:
        type: identity
        state_variables: [f_qPSC]
        rationale: |
          State variable f_qPSC directly represents the observed relative naive PSC abundance.
      units: dimensionless
      uses_inputs:
        - naive_psc_fraction_week8_mean
        - naive_psc_fraction_week8_sd
        - naive_psc_fraction_week10_mean
        - naive_psc_fraction_week10_sd
      evaluation_points: [56.0, 70.0]
      sample_size: [2, 4]
      sample_size_rationale: |
        Tansi et al. report 1-3 animals per timepoint with 4 images per mouse. Assigned n=2 for 8-week and n=4 for 10-week as mid-range estimates.
      distribution_code: |
        def derive_distribution(inputs, ureg):
            import numpy as np
            rng = np.random.default_rng(42)
            n_mc = 10000

            means = [
                inputs['naive_psc_fraction_week8_mean'].magnitude,
                inputs['naive_psc_fraction_week10_mean'].magnitude
            ]
            sds = [
                inputs['naive_psc_fraction_week8_sd'].magnitude,
                inputs['naive_psc_fraction_week10_sd'].magnitude
            ]

            medians = []
            ci95_list = []

            for m, sd in zip(means, sds):
                mu_log = np.log(m**2 / np.sqrt(m**2 + sd**2))
                sigma_log = np.sqrt(np.log(1.0 + (sd**2 / m**2)))
                samples = rng.lognormal(mu_log, sigma_log, n_mc)
                medians.append(np.median(samples))
                ci95_list.append([np.percentile(samples, 2.5), np.percentile(samples, 97.5)])

            return {
                'median': medians,
                'ci95': ci95_list,
                'units': 'dimensionless'
            }
      likelihood:
        distribution: lognormal
        rationale: |
          Fractions are positive; lognormal keeps values > 0 with modest CV.

  identifiability_notes: |
    Only the ratio k_psc_encounter/k_psc_const (effective approach rate, 1/day) is directly informed by the naive PSC fraction time-course. Absolute values of k_psc_encounter and k_psc_const remain correlated and require additional constraints (e.g., constitutive PSC density from psc_recruitment_const target) for individual identification.

# =============================================================================
# EXPERIMENTAL CONTEXT
# =============================================================================
experimental_context:
  species: mouse
  system: in_vivo_xenograft
  indication: PDAC
  cell_lines:
    - name: Panc-1-fl
      species: human
      tissue_origin: pancreas
      cell_type: pancreatic ductal adenocarcinoma

# =============================================================================
# STUDY INTERPRETATION
# =============================================================================
study_interpretation: |
  Tansi et al. (2024) quantified vitamin A-positive naive pancreatic stellate cells in orthotopic Panc-1-fl tumors at 4, 8, and 10 weeks. The gradual increase indicates slow recruitment of resident PSCs from surrounding pancreas into the expanding tumor stroma. We model this as first-order approach to the constitutive PSC density, providing timescale information for the k_psc_encounter parameter.

key_assumptions:
  - |
    Vitamin A-positive naive PSCs correspond to qPSC species in the QSP model.
  - |
    2D counts per HPF are proportional to 3D qPSC density; proportionality constant is time-invariant.
  - |
    Relative naive PSC abundance can be interpreted as fraction (0-1) of constitutive PSC density (k_psc_const).
  - |
    Recruitment dominates over proliferation, activation, or death during 4-10 week window.
  - |
    Orthotopic Panc-1-fl xenografts in nude mice approximate human PDAC PSC recruitment kinetics.

key_study_limitations:
  - |
    Semi-quantitative data from Figure 8B with small n per timepoint; values inferred visually.
  - |
    Immunodeficient mouse model may differ from immunocompetent human PDAC.
  - |
    Only three timepoints (weeks 4, 8, 10) limit temporal resolution.
  - |
    Cannot distinguish peritumoral vs intratumoral PSC locations.

