key_assumptions:
- number: 1
  text: Apoptotic index (AI) measured by TUNEL on resected PDAC approximates the steady‑state fraction of tumor cells in apoptosis, so the per‑cell death rate equals AI divided by the duration that apoptotic nuclei remain TUNEL‑positive (clearance time).
- number: 2
  text: The clearance time for TUNEL‑positive tumor cells in PDAC is similar in magnitude to mammalian tissues where it has been measured (~2–3 h), and we model it with a broad triangular distribution between 2 and 3 h centered at 2 h 20 min to reflect method- and tissue‑dependence.
- number: 3
  text: Reported AI values (means±SD) from independent PDAC cohorts can be treated as truncated normal measurements representing between-tumor variability; lacking raw data, equal mixture weighting is used to avoid assuming group sizes for survivin strata.
- number: 4
  text: Spontaneous apoptosis measured ex vivo on surgical specimens reflects in vivo baseline death in untreated PDAC and is not materially biased by perioperative factors or pre-analytic handling.
- number: 5
  text: Cancer-cell death is modeled as first‑order (per-capita) over the time scale relevant to the QSP model, ignoring spatial intratumoral heterogeneity in apoptosis.
derivation_explanation: |-
  1) Extract apoptotic index (%) from two primary PDAC cohorts: Sarela et al. report “apoptosis index was 1.38±0.69%,” and Satoh et al. report 0.445±0.150% (high survivin) and 0.961±0.378% (low survivin). We model each as a truncated normal distribution on [0,100]. citeturn6search0turn15view0

  2) Convert AI (%) to a death rate by dividing by the time a nucleus remains TUNEL-positive. Thomaidou et al. measured a “clearance time of TUNEL-positive nuclei” of 2 h 20 min and state it is “on average 2–3 hr,” which we encode as a triangular distribution with min=2 h, mode=2.33 h, max=3 h. ASSUMPTION 1 and 2. citeturn14search1

  3) For each Monte Carlo draw, randomly choose one study (equal weights; ASSUMPTION 3), sample AI from its truncated normal, sample a clearance time from the triangular distribution, convert hours to days, and compute k = (AI/100)/T_days (units 1/day). ASSUMPTION 5.

  4) Repeat for 100,000 draws with a fixed seed for reproducibility, then report robust statistics: median, IQR (Q3−Q1), and 95% interval (2.5th–97.5th percentiles). This propagates uncertainty from both AI and clearance time (ASSUMPTION 2–3) without relying on parametric asymptotics.

  5) The resulting distribution centers near 0.1 1/day, consistent with PDAC AIs around 0.4–1.4% and a ~2–3 h TUNEL window; higher/lower tails arise from cohort differences and clearance time variability. ASSUMPTION 4.
key_study_limitations: |-
  - TUNEL positivity window was quantified in non-PDAC tissue; although widely used, its generalization to PDAC is uncertain and likely method-dependent, directly affecting k (systematic scaling risk). citeturn14search1turn12search2
  - AI is a cross‑sectional snapshot and may miss temporal fluctuations or regional intratumoral heterogeneity; sampling bias in resection specimens could misestimate average apoptosis.
  - Satoh et al. provide subgroup AIs by survivin expression without group sizes; equal‑weight mixture may over/under‑represent extreme phenotypes (survivin‑high tumors). citeturn15view0
  - TUNEL detects DNA fragmentation and can label some non‑apoptotic death modalities; conversely, very rapid clearance can undercount apoptosis, biasing AI low. citeturn12search1
