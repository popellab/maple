  derivation_code: |
    import math, random

    def _trunc_norm(mean, sd, lower, upper):
        # simple rejection sampler for truncated normal
        while True:
            x = random.gauss(mean, sd)
            if lower <= x <= upper:
                return x

    def derive_parameter(inputs):
        # map inputs
        iv = {d['name']: d['value'] for d in inputs}
        # Apoptotic index distributions (percent)
        studies = [
            {'mean': iv['AI_Sarela_mean_pct'], 'sd': iv['AI_Sarela_sd_pct']},
            {'mean': iv['AI_Satoh_lowSurvivin_mean_pct'], 'sd': iv['AI_Satoh_lowSurvivin_sd_pct']},
            {'mean': iv['AI_Satoh_highSurvivin_mean_pct'], 'sd': iv['AI_Satoh_highSurvivin_sd_pct']}
        ]
        # TUNEL clearance time (hours) modeled as triangular around central within [min,max]
        t_min = iv['TUNEL_clearance_min_hours']
        t_mode = iv['TUNEL_clearance_central_hours']
        t_max = iv['TUNEL_clearance_max_hours']

        # Monte Carlo settings (fixed for reproducibility if desired)
        random.seed(2025)
        n = 100000
        ks = []
        for _ in range(n):
            s = random.choice(studies)
            ai_pct = _trunc_norm(s['mean'], s['sd'], 0.0, 100.0)
            t_hours = random.triangular(t_min, t_max, t_mode)
            t_days = t_hours / 24.0
            # Convert % to fraction, then divide by time-window to get rate per day
            k = (ai_pct / 100.0) / t_days
            ks.append(k)
        ks.sort()
        def pct(q):
            idx = int(q*(n-1))
            return ks[idx]
        median = pct(0.5)
        q1 = pct(0.25)
        q3 = pct(0.75)
        iqr = q3 - q1
        ci95 = [pct(0.025), pct(0.975)]
        return {'median_param': median, 'iqr_param': iqr, 'ci95_param': ci95}
