  used_for: Motivation to model uncertainty in the duration of detectable apoptotic features (short, method-dependent time window).
  method_description: Reviews that apoptosis has a short, variable detection time-window depending on marker/method; supports treating clearance time as uncertain when converting AI to a rate.
