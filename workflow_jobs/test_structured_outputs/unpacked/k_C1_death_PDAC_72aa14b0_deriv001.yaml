context_hash: 72aa14b0
mathematical_role: First-order per-capita death rate constant for tumor cells (C1) used to model spontaneous cancer cell loss in the tumor compartment.
parameter_range: positive_reals
study_overview: We estimate the baseline spontaneous cancer death rate in PDAC by converting the apoptotic index (fraction of TUNEL-positive tumor cells) measured in resected human tumors into a per‑day rate using the duration (‘clearance time’) that apoptotic nuclei remain TUNEL-positive. Primary PDAC cohorts provide apoptotic index (%), and a methodological study provides a 2–3 h TUNEL-positivity window to convert percentage to 1/day rates.
study_design: Primary data come from immunohistochemistry/TUNEL on human PDAC resections reporting apoptosis index as a percentage of tumor cells. We combine two independent cohorts (n=52 and n=26 PDACs) and propagate uncertainty from the index measurements and from the TUNEL clearance time to derive k_C1_death via Monte Carlo simulation. citeturn6search0turn15view0turn14search1
