  # Python derivation code as a FUNCTION that takes inputs and returns outputs
  derivation_code: |
    ```python
    import numpy as np

    def derive_distribution(inputs):
        """
        Bootstrap expected distribution for test statistic from literature data.

        Args:
            inputs: dict of input values with keys matching input names above

        Returns:
            dict with keys: mean_stat, variance_stat, ci95_stat
        """
        # Extract inputs
        response_rate = inputs['response_rate']['value']
        sample_size = int(inputs['sample_size']['value'])
        response_threshold = inputs['response_threshold']['value']
        random_seed = int(inputs['random_seed']['value'])

        # Bootstrap resampling
        np.random.seed(random_seed)
        B = 5000
        mc_draws = np.zeros(B)

        for i in range(B):
            # Resample response outcomes (responder vs non-responder)
            n_responders = np.random.binomial(sample_size, response_rate)
            resampled_rate = n_responders / sample_size

            # Convert diameter-based response to volume-based response
            # Using spherical approximation from THERASSE2000 (Equation 2)
            # Response is calculated as volume change, accounting for 30% threshold
            diameter_reduction = response_threshold  # 0.30 for PR
            volume_reduction = 1 - (1 - diameter_reduction)**3  # Cubic relationship

            # Adjust response rate for volume-based calculation
            adjusted_rate = resampled_rate * (1 - volume_reduction)

            # Add measurement uncertainty (imaging assessment variability)
            measurement_cv = 0.08  # 8% CV for imaging
            noisy_rate = np.random.normal(adjusted_rate, adjusted_rate * measurement_cv)

            mc_draws[i] = np.clip(noisy_rate, 0, 1)  # Keep in [0,1]

        # Return required statistics
        return {
            'mean_stat': float(np.mean(mc_draws)),
            'variance_stat': float(np.var(mc_draws, ddof=1)),
            'ci95_stat': [float(np.percentile(mc_draws, 2.5)),
                          float(np.percentile(mc_draws, 97.5))]
        }
    ```

  # Computed outputs (must match what derivation_code produces)
  mean: NUMERIC_VALUE
  variance: NUMERIC_VALUE
  ci95: [NUMERIC_LOWER, NUMERIC_UPPER]
  units: "UNITS_STRING"

  # Key assumptions (enumerated dict)
  key_assumptions:
    1: "Binomial sampling adequately models patient heterogeneity"
    2: "Imaging measurement error is normally distributed with CV=8%"
    3: "Single-arm response rate is comparable to hypothetical control-adjusted response"

# Step-by-step explanation of the derivation code
# ============================================================================
derivation_explanation: |
  **Step 1:** Extract response rate (28%) and sample size (n=94) from clinical trial (TOPALIAN2012, Table 2).
  ASSUMPTION 1: Binomial sampling adequately models patient heterogeneity in treatment response,
  which is reasonable for binary outcomes with independent patients.

  **Step 2:** For each bootstrap iteration, resample responder count using binomial distribution
  to capture sampling uncertainty in the observed response rate.

  **Step 3:** Convert diameter-based response threshold (30% from EISENHAUER2009) to volume-based
  response using spherical approximation from THERASSE2000. This accounts for the cubic relationship
  between diameter and volume: 30% diameter reduction equals 65.7% volume reduction.

  **Step 4:** Add imaging measurement uncertainty (8% CV) to each resampled response rate.
  ASSUMPTION 2: Imaging measurement error is normally distributed with CV=8%, based on typical
  RECIST assessment variability reported in imaging validation studies.

  **Step 5:** Clip values to [0, 1] range to maintain valid probability bounds.
  ASSUMPTION 3: Single-arm response rate is comparable to hypothetical control-adjusted response,
  which may overestimate treatment effect without concurrent control but is appropriate for
  model validation when treatment effect is the target quantity.

  **Step 6:** Generate 5000 bootstrap samples and compute mean, variance, and 95% CI from the
  resulting distribution.

# Important limitations
# ============================================================================
key_study_limitations: |
  - **Sample size:** Moderate sample size (n=94) limits precision of tail probabilities (TOPALIAN2012)
  - **Dose heterogeneity:** Multiple dose levels combined may introduce variability in response rates (TOPALIAN2012)
  - **Imaging variability:** RECIST assessments have known inter-reader variability that may exceed assumed 8% CV (TOPALIAN2012)
  - **Early trial phase:** Phase 1 trial may not fully represent treatment-experienced patient populations (TOPALIAN2012)

