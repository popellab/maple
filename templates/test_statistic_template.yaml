# Model output computation specification (Python)
# This code computes the test statistic from model simulation outputs
model_output:
  code: |
    ```python
    import numpy as np

    def compute_test_statistic(time, species_dict):
        """
        Compute test statistic from pre-extracted model simulation vectors.

        Args:
            time: numpy array of time points (days)
            species_dict: dict mapping species names to numpy arrays
                         Keys are from REQUIRED_SPECIES (e.g., 'V_T.TumorVolume')

        Returns:
            test_statistic: float, the computed test statistic value
        """
        # Example: Percent change in tumor volume from baseline to day 56
        tumor_volume = species_dict['V_T.TumorVolume']

        # Interpolate to get values at specific timepoints
        baseline_volume = np.interp(0, time, tumor_volume)
        day56_volume = np.interp(56, time, tumor_volume)

        # Compute percent change
        test_statistic = ((day56_volume - baseline_volume) / baseline_volume) * 100

        return test_statistic
    ```

