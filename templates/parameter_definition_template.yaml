parameter_name: "PARAMETER_NAME"
parameter_units: "UNITS"  
parameter_definition: |
  [One-sentence definition of what this parameter represents biologically. Must specify:
  - The biological process being quantified (e.g., "rate of T cell activation", "binding affinity between drug and receptor") 
  - Cell type/compartment where process occurs (e.g., "in tumor-infiltrating CD8+ T cells", "at the tumor-blood interface")
  - Key modulating factors if applicable (e.g., "in presence of IL-2", "under hypoxic conditions")
  - Typical physiological range when known (e.g., "typically 0.1-10 nM in human plasma")]

canonical_scale: "CANONICAL_SCALE"  # Must be exactly one of: identity, log, logit
canonical_scale_rationale: |
  [Brief justification for canonical scale choice based on parameter properties:
  - If identity: "Parameter has symmetric distribution and finite range"
  - If log: "Parameter is strictly positive and varies over multiple orders of magnitude" 
  - If logit: "Parameter is bounded between 0 and 1 (probability/fraction/binding fraction)"]

mathematical_role: |
  **Governing Equation(s):**
  [Show the specific mathematical equation(s) where this parameter appears, using proper LaTeX formatting.
  Include the full equation context, not just the parameter term. Examples:]
  
  $$\frac{dT_{\text{act}}}{dt} = k_{\text{act}} \cdot T_{\text{naive}} \cdot \frac{[\text{Antigen}]^n}{K_d^n + [\text{Antigen}]^n} - k_{\text{death}} \cdot T_{\text{act}}$$
  
  $$\text{Drug binding} = \frac{k_{\text{on}} \cdot [\text{Drug}] \cdot [\text{Receptor}]}{k_{\text{off}} + k_{\text{on}} \cdot [\text{Drug}]}$$
  
  **Parameter Role:**
  [Describe exactly how this parameter affects the model dynamics. Be specific about:]
  - For rate constants: What biological process it controls (synthesis, degradation, transport, activation, etc.)
  - For binding parameters: What molecular interaction it quantifies (affinity, avidity, cooperativity)
  - For Hill coefficients: How it shapes dose-response curves (cooperativity, switch-like behavior)
  - For EC50/IC50: What concentration produces half-maximal effect and in what experimental context
  - System-level impact: How changes in this parameter affect overall model behavior]
  
  **Units Interpretation:**
  [Explain what the units mean in biological context with intuitive examples:]
  - Time units: "per day" = how many turnovers per day, "per second" = molecular-scale kinetics
  - Concentration units: "nM" = typical drug concentrations, "μM" = metabolite levels
  - Dimensionless: "Hill coefficient of 2 = cooperative binding", "fraction = 0.3 means 30% of cells"
  - Rate units: "cells/day" = proliferation rate, "molecules/cell/sec" = production rate]
