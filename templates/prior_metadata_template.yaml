pooled_statistics:
  # Central tendency and spread
  mean: NUMERIC_VALUE
  median: NUMERIC_VALUE  
  std: NUMERIC_VALUE
  q25: NUMERIC_VALUE
  q75: NUMERIC_VALUE
  min: NUMERIC_VALUE
  max: NUMERIC_VALUE
  
  # Confidence intervals for pooled estimate
  ci_lower_95: NUMERIC_VALUE  # 95% CI lower bound
  ci_upper_95: NUMERIC_VALUE  # 95% CI upper bound
  ci_lower_50: NUMERIC_VALUE  # 50% CI lower bound (credible interval)
  ci_upper_50: NUMERIC_VALUE  # 50% CI upper bound
  
  # Meta-analysis heterogeneity measures
  tau_squared_estimate: NUMERIC_VALUE  # Between-study variance estimate
  i_squared: NUMERIC_VALUE  # I² heterogeneity statistic (0-100%)
  h_squared: NUMERIC_VALUE  # H² heterogeneity statistic
  cochran_q: NUMERIC_VALUE  # Cochran's Q test statistic
  cochran_q_pvalue: NUMERIC_VALUE  # P-value for heterogeneity test
  
  # Sample size and effective sample size
  n_total_samples: INTEGER_VALUE  # Total posterior draws across all studies
  n_effective_samples: INTEGER_VALUE  # Effective sample size accounting for weights
  n_studies: INTEGER_VALUE  # Number of studies pooled
  
  # Distributional properties
  skewness: NUMERIC_VALUE  # Sample skewness
  kurtosis: NUMERIC_VALUE  # Sample excess kurtosis
  mode: NUMERIC_VALUE  # Approximate mode (highest density point)

studies:
  STUDY_ID_1:
    file: "study_STUDY_ID_1.npz"
    
    # Weighting and importance
    weight: NUMERIC_WEIGHT  # Inverse-variance weight (0-1, normalized, sum=1 across studies)
    context_weight: NUMERIC_CONTEXT_WEIGHT  # Quality/relevance weight (0-1)
    effective_weight: NUMERIC_EFFECTIVE_WEIGHT  # Combined weight accounting for heterogeneity
    
    # Statistical properties
    link_sd: NUMERIC_LINK_SD  # Standard deviation on link scale
    link_function: "identity | log | logit | sqrt | reciprocal"  # Transformation applied
    n_samples: INTEGER_SAMPLES  # Number of posterior draws from study
    effective_n: INTEGER_EFFECTIVE_N  # Effective sample size for this study
    
    # Study characteristics
    study_mean: NUMERIC_STUDY_MEAN  # Study-specific mean estimate
    study_sd: NUMERIC_STUDY_SD  # Study-specific standard deviation
    study_n_original: INTEGER_ORIGINAL_N  # Original sample size in study
    
    # Quality assessment
    quality_score: NUMERIC_QUALITY  # Overall quality score (0-1)
    bias_risk: "LOW | MODERATE | HIGH"  # Risk of bias assessment
    relevance_score: NUMERIC_RELEVANCE  # Relevance to target context (0-1)
    
    # Traceability
    source_path: "PATH_TO_SOURCE_YAML"
    source_hash: "SHA256_HASH"  # Hash of source YAML file
    extraction_date: "ISO_DATETIME"  # When data was extracted
    
  STUDY_ID_2:
    file: "study_STUDY_ID_2.npz"
    weight: NUMERIC_WEIGHT
    context_weight: NUMERIC_CONTEXT_WEIGHT
    effective_weight: NUMERIC_EFFECTIVE_WEIGHT
    link_sd: NUMERIC_LINK_SD
    link_function: "identity | log | logit | sqrt | reciprocal"
    n_samples: INTEGER_SAMPLES
    effective_n: INTEGER_EFFECTIVE_N
    study_mean: NUMERIC_STUDY_MEAN
    study_sd: NUMERIC_STUDY_SD
    study_n_original: INTEGER_ORIGINAL_N
    quality_score: NUMERIC_QUALITY
    bias_risk: "LOW | MODERATE | HIGH"
    relevance_score: NUMERIC_RELEVANCE
    source_path: "PATH_TO_SOURCE_YAML"
    source_hash: "SHA256_HASH"
    extraction_date: "ISO_DATETIME"

pooling_config:
  method: "inverse_variance_weighted"
  total_target_draws: INTEGER_TARGET_DRAWS  # Default: 200000
  tau_squared: NUMERIC_TAU  # Between-study heterogeneity variance (default: 0.0)
  random_seed: INTEGER_SEED  # Default: 123

