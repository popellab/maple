# Parameter estimates with structured inputs and derivation code
# ============================================================================
parameter_estimates:
  # Structured inputs: All quantities used in derivation
  # Each input references a source for full traceability
  # VALUES appear ONLY here, not duplicated in sources section
  inputs:
    - name: "median_survival"
      value: 0.45
      units: "years"
      description: "Median survival from trial endpoint"
      source_ref: "PRIMARY_STUDY"  # Points to entry in primary_data_sources
      assumption: null  # Use this field if value is assumed rather than measured

    - name: "sample_size"
      value: 100
      units: "dimensionless"  # Use "dimensionless" for counts, ratios, fractions
      description: "Number of patients in treatment arm"
      source_ref: "PRIMARY_STUDY"
      assumption: null

    - name: "conversion_factor"
      value: 365.25
      units: "days/year"
      description: "Days per year for unit conversion"
      source_ref: null  # No source needed for standard conversion
      assumption: "Standard calendar conversion"

  # Python derivation code as a FUNCTION that takes inputs and returns outputs
  # This enables automated verification: inputs → code → outputs
  derivation_code: |
    ```python
    import numpy as np

    def derive_parameter(inputs):
        """
        Function-based derivation for automated validation.
        Takes inputs dict, returns dict with mean_param, variance_param, ci95_param.
        """
        # Extract named inputs
        median_survival = inputs['median_survival']['value']
        sample_size = inputs['sample_size']['value']
        conversion_factor = inputs['conversion_factor']['value']

        # Run bootstrap with uncertainty propagation
        np.random.seed(123)
        B = 5000
        mc_draws = np.zeros(B)

        for i in range(B):
            # Example: exponential survival with parameter uncertainty
            lambda_estimate = 1.0 / median_survival
            lambda_se = lambda_estimate / np.sqrt(sample_size)

            # Sample parameter with uncertainty
            lambda_boot = np.random.normal(lambda_estimate, lambda_se)

            # Transform to desired parameter
            mc_draws[i] = lambda_boot * conversion_factor

        # Return required summary statistics
        return {
            'mean_param': float(np.mean(mc_draws)),
            'variance_param': float(np.var(mc_draws, ddof=1)),
            'ci95_param': [float(np.percentile(mc_draws, 2.5)),
                          float(np.percentile(mc_draws, 97.5))]
        }
    ```

  # Computed outputs (must match what derivation_code produces)
  mean: NUMERIC_VALUE
  variance: NUMERIC_VALUE
  ci95: [NUMERIC_LOWER, NUMERIC_UPPER]
  units: "1/day"

  # Key assumptions (enumerated list of critical assumptions only)
  key_assumptions:
    1: "Exponential survival model (constant hazard rate)"
    2: "Parameter uncertainty follows normal distribution (CLT with n=100)"
    3: "Digitization error approximately ±0.3 mg/L"

# Step-by-step explanation of the derivation code
# ============================================================================
# Include detailed justification for each numbered assumption from key_assumptions
derivation_explanation: |
  **Step 1:** Extract median survival (0.45 years) from trial data (PRIMARY_STUDY, Table 2).
  ASSUMPTION 1: Survival follows exponential distribution with constant hazard rate, which is
  typical for stage III disease based on Kaplan-Meier analysis showing memoryless property.

  **Step 2:** Calculate rate parameter as λ = 1/median_survival = 2.22 per year. Convert to
  daily rate by multiplying by 365.25 days/year.

  **Step 3:** Estimate uncertainty using standard error SE = λ/sqrt(n) where n=100 patients.

  **Step 4:** Generate 5000 bootstrap samples from normal distribution with mean=λ and std=SE.
  ASSUMPTION 2: Parameter uncertainty is normally distributed, justified by Central Limit
  Theorem with sample size n=100 providing adequate convergence.

  **Step 5:** Extract digitized concentration values from Figure 3B using WebPlotDigitizer.
  ASSUMPTION 3: Digitization error is approximately ±0.3 mg/L based on pixel resolution and
  axis scaling analysis. This uncertainty is incorporated into bootstrap resampling.

