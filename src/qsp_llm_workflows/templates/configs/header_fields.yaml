# Header field definitions for QSP metadata templates
# ============================================================================
# This config defines which fields are "headers" (metadata about the file)
# vs "content" (scientific data extracted/generated by LLMs)
#
# Headers are:
# - Stripped from templates before sending to LLMs (so LLMs can't modify them)
# - Preserved when fixing validation errors
# - Added back during unpacking with appropriate values
#
# Content fields are:
# - What the LLM actually extracts/generates
# - What gets validated and potentially fixed
# ============================================================================

parameter_metadata:
  v3:
    # Fields that identify and categorize the file (not extracted by LLM)
    header_fields:
      - schema_version
      - parameter_name
      - parameter_units
      - parameter_definition
      - cancer_type
      - tags
      - derivation_id
      - derivation_timestamp
      - model_context
      - context_hash

    # Field name where content section begins
    content_starts_at: mathematical_role

  v2:
    # Legacy v2 schema (for schema conversion support)
    header_fields:
      - schema_version
      - parameter_name
      - parameter_units
      - parameter_definition
      - cancer_type
      - tags
      - model_context
      - context_hash
    content_starts_at: mathematical_role

  v1:
    # Legacy v1 schema (for schema conversion support)
    header_fields:
      - schema_version
      - parameter_name
      - parameter_units
      - parameter_definition
      - cancer_type
      - tags
      - model_context
      - context_hash
    content_starts_at: mathematical_role

test_statistic:
  v2:
    header_fields:
      - schema_version
      - test_statistic_id
      - cancer_type
      - scenario_context
      - required_species
      - derived_species_description
      - tags
      - context_hash
    content_starts_at: model_output  # LLM generates model_output and everything after

  v1:
    # Legacy v1 schema (for schema conversion support)
    header_fields:
      - schema_version
      - test_statistic_id
      - cancer_type
      - scenario_context
      - required_species
      - derived_species_description
      - tags
      - context_hash
    content_starts_at: model_output
