  # Python derivation code as a FUNCTION that takes inputs and returns outputs
  # This enables automated verification: inputs → code → outputs
  derivation_code: |
    ```python
    import numpy as np

    def derive_parameter(inputs):
        """
        Function-based derivation for automated validation.
        Takes inputs dict, returns dict with mean_param, variance_param, ci95_param.
        """
        # Extract named inputs
        median_survival = inputs['median_survival']['value']
        sample_size = inputs['sample_size']['value']
        plasma_clearance_reference = inputs['plasma_clearance_reference']['value']
        conversion_factor = inputs['conversion_factor']['value']
        random_seed = inputs['random_seed']['value']

        # Run bootstrap with uncertainty propagation
        np.random.seed(int(random_seed))
        B = 5000
        mc_draws = np.zeros(B)

        for i in range(B):
            # Example: exponential survival with parameter uncertainty
            lambda_estimate = 1.0 / median_survival
            lambda_se = lambda_estimate / np.sqrt(sample_size)

            # Sample parameter with uncertainty
            lambda_boot = np.random.normal(lambda_estimate, lambda_se)

            # Apply two-compartment clearance transformation
            # Using Equation 3.14 from COMPARTMENTAL2008 with reference clearance from GOODMAN2018
            clearance_ratio = plasma_clearance_reference / 1.0  # Normalize to reference clearance
            adjusted_lambda = lambda_boot * clearance_ratio

            # Transform to desired parameter
            mc_draws[i] = adjusted_lambda * conversion_factor

        # Return required summary statistics (outlier-robust)
        return {
            'median_param': float(np.median(mc_draws)),
            'iqr_param': float(np.percentile(mc_draws, 75) - np.percentile(mc_draws, 25)),
            'ci95_param': [float(np.percentile(mc_draws, 2.5)),
                          float(np.percentile(mc_draws, 97.5))]
        }
    ```

