# Step-by-step explanation of the derivation code
# ============================================================================
# Include detailed justification for each numbered assumption from key_assumptions
derivation_explanation: |
  **Step 1:** Extract median survival (0.45 years) and sample size (n=100) from clinical trial data (MARCHINGO2014, Table 2 and Results).
  ASSUMPTION 1: Survival follows exponential distribution with constant hazard rate, which is
  typical for stage III disease based on Kaplan-Meier analysis showing memoryless property.

  **Step 2:** Calculate hazard rate parameter as λ = 1/median_survival = 2.22 per year.
  Estimate uncertainty using standard error SE = λ/sqrt(n) where n=100 patients.
  ASSUMPTION 2: Parameter uncertainty is normally distributed, justified by Central Limit
  Theorem with sample size n=100 providing adequate convergence.

  **Step 3:** Generate 5000 bootstrap samples from normal distribution with mean=λ and std=SE to
  propagate uncertainty through subsequent transformations.

  **Step 4:** Apply two-compartment clearance transformation using Equation 3.14 from COMPARTMENTAL2008,
  scaled by reference plasma clearance (0.67 L/h from GOODMAN2018) to convert systemic hazard rate to
  tumor-specific clearance rate.
  ASSUMPTION 3: Two-compartment model adequately describes drug distribution between plasma and tumor
  compartments for this therapeutic context.

  **Step 5:** Convert to daily rate by multiplying by 365.25 days/year. Compute final parameter
  statistics (median, IQR, 95% CI) from bootstrap distribution. We use outlier-robust statistics
  (median/IQR) instead of mean/variance to reduce sensitivity to extreme values.

# Important limitations and their specific impact on parameter reliability
# ============================================================================
key_study_limitations: |
  - **Sample size/power:** Moderate sample size (n=100) limits precision of uncertainty estimates and subgroup analyses (MARCHINGO2014)
  - **Survival model assumption:** Exponential survival model assumes constant hazard rate, which may not hold for patients with disease progression or treatment changes (MARCHINGO2014)
  - **Compartmental model simplification:** Two-compartment model is a simplified representation of complex tumor pharmacokinetics and may not capture heterogeneous drug distribution (COMPARTMENTAL2008)
  - **External validity:** Single-center trial may limit generalizability to broader patient populations with different disease characteristics (MARCHINGO2014)

