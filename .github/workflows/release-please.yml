name: Release Please

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Existing tag to build and publish to PyPI (e.g. v0.7.0). Leave blank on normal runs."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # 'true' when any release was cut this run (manifest-mode output).
      released: ${{ steps.release.outputs.releases_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # Publish on a fresh release, or when manually dispatched with a tag to backfill.
    if: ${{ needs.release-please.outputs.released == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag != '') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/maple-qsp
    permissions:
      id-token: write  # trusted publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
        with:
          # Dispatch: the named tag. Push: the release commit that just merged.
          ref: ${{ github.event.inputs.publish_tag || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
